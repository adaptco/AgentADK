<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matrix Dash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="noise"></div>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Canvas Runner Simulation</p>
      <h1>Matrix Dash</h1>
      <p class="subtitle">
        Dodge the kill code. Stay in sync.
      </p>
    </header>

    <section class="game-shell">
      <div class="hud">
        <div class="panel">
          <span class="label">Score</span>
          <span id="scoreValue" class="value">0</span>
        </div>
        <div class="panel">
          <span class="label">Best</span>
          <span id="bestValue" class="value">0</span>
        </div>
        <div class="panel panel-wide">
          <span class="label">Controls</span>
          <span class="value value-small">Space / Arrow Up / Tap</span>
        </div>
      </div>

      <div class="canvas-frame" id="canvasFrame">
        <canvas id="gameCanvas" aria-label="Matrix Dash game canvas"></canvas>
        <div id="messageOverlay" class="message"></div>
        <button id="jumpButton" class="jump-button" type="button">JUMP</button>
      </div>
    </section>
  </main>
  <script src="./game.js"></script>
</body>
</html>
